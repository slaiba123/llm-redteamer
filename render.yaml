services:
  - type: web
    name: llm-redteamer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=10000 --server.headless=true
    envVars:
      - key: GROQ_API_KEY
        scope: run
      - key: OPENAI_API_KEY
        scope: run
      - key: GOOGLE_API_KEY
        scope: run